<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoRoom | Premium Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .glass {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(12px);
      }
      .chat-bubble-me {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      }
      .sidebar-item-active {
        background: rgba(99, 102, 241, 0.1);
        border-left: 3px solid #6366f1;
      }
    </style>
  </head>
  <body class="bg-[#020617] text-slate-200 h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="fixed inset-y-0 left-0 w-80 bg-[#0f172a] border-r border-slate-800/50 flex flex-col z-30 -translate-x-full md:translate-x-0 md:relative transition-all duration-300 ease-in-out"
    >
      <div class="p-8 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20"
          >
            <i data-lucide="layers" class="w-6 h-6 text-white"></i>
          </div>
          <h1 class="text-xl font-bold tracking-tight text-white">
            Echo<span class="text-indigo-500">Room</span>
          </h1>
        </div>
        <button
          id="closeMenu"
          class="md:hidden p-2 hover:bg-slate-800 rounded-lg"
        >
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <div class="px-6 mb-8">
        <button
          id="newRoomBtn"
          class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white py-3 rounded-2xl font-medium flex items-center justify-center gap-2 transition-all active:scale-95"
        >
          <i data-lucide="plus" class="w-4 h-4"></i>
          Create Workspace
        </button>
      </div>

      <div class="flex-1 overflow-y-auto px-4 custom-scrollbar">
        <p
          class="text-[11px] font-bold text-slate-500 px-4 mb-4 uppercase tracking-[0.2em]"
        >
          Channels
        </p>
        <nav id="roomList" class="space-y-1"></nav>
      </div>

      <div
        class="p-6 border-t border-slate-800/50 bg-[#0f172a]/80 backdrop-blur-sm"
      >
        <div
          class="flex items-center gap-4 p-2 rounded-2xl hover:bg-slate-800/40 transition-colors cursor-pointer group"
        >
          <div class="relative">
            <img
              src="https://ui-avatars.com/api/?name=You&background=6366f1&color=fff"
              class="w-10 h-10 rounded-xl object-cover ring-2 ring-indigo-500/20"
              alt="Avatar"
            />
            <div
              class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-4 border-[#0f172a] rounded-full"
            ></div>
          </div>
          <div class="flex-1 min-w-0">
            <p
              id="usernameDisplay"
              class="text-sm font-bold text-white truncate"
            >
              You
            </p>
            <p class="text-xs text-slate-500 truncate">Online</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 relative bg-[#020617]">
      <header
        class="h-20 glass border-b border-slate-800/50 px-8 flex items-center justify-between sticky top-0 z-20"
      >
        <div class="flex items-center gap-4">
          <button
            id="menuBtn"
            class="md:hidden p-2 text-slate-400 hover:bg-slate-800 rounded-lg"
          >
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
          <div>
            <h2
              id="currentRoomName"
              class="font-bold text-lg text-white flex items-center gap-2"
            >
              <span class="text-indigo-500">#</span> general-chat
            </h2>
            <p class="text-xs text-slate-500 font-medium">
              Discussion about company-wide projects
            </p>
          </div>
        </div>
      </header>

      <div id="messages" class="flex-1 p-8 overflow-y-auto space-y-8"></div>

      <footer
        class="p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent"
      >
        <div class="max-w-5xl mx-auto relative group">
          <div
            class="absolute inset-y-0 left-5 flex items-center text-slate-500 group-focus-within:text-indigo-400 transition-colors"
          >
            <i data-lucide="command" class="w-5 h-5"></i>
          </div>
          <input
            type="text"
            id="messageInput"
            class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl pl-14 pr-20 py-5 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all placeholder-slate-600 text-slate-200 shadow-2xl"
            placeholder="Type a message..."
          />
          <div class="absolute inset-y-2 right-2 flex items-center gap-2">
            <button
              id="sendBtn"
              class="bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-xl shadow-lg shadow-indigo-600/20 transition-all active:scale-95"
            >
              <i data-lucide="send-horizontal" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
      </footer>
    </main>

    <script src="js/chat.js"></script>
  </body>
</html>
