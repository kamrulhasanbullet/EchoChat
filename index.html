<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoRoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-blue-600">EchoRoom</h1>
        <p class="text-gray-500 mt-2">Connect with friends in real-time</p>
      </div>

      <!-- Tabs -->
      <div class="flex border-b mb-6">
        <button
          id="loginTab"
          class="flex-1 py-3 text-lg font-medium border-b-4 border-blue-600 text-blue-600"
        >
          Login
        </button>
        <button
          id="registerTab"
          class="flex-1 py-3 text-lg font-medium text-gray-500 hover:text-gray-700"
        >
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="space-y-5">
          <input
            type="email"
            id="loginEmail"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
            placeholder="Email address"
            required
          />

          <input
            type="password"
            id="loginPassword"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
            placeholder="Password"
            required
          />

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition"
          >
            Login
          </button>
        </div>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <div class="space-y-5">
          <input
            type="text"
            id="regUsername"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
            placeholder="Username"
            required
          />

          <input
            type="email"
            id="regEmail"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
            placeholder="Email address"
            required
          />

          <input
            type="password"
            id="regPassword"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
            placeholder="Password"
            required
          />

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition"
          >
            Create Account
          </button>
        </div>
      </form>

      <p id="message" class="mt-4 text-center text-sm font-medium"></p>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
